## Network configuration for Checkers

# Hostname or IP address where CheckersServer runs
network.host=localhost

# TCP ports for CheckersServer
# Text protocol listener
network.port.text=5000
# JSON protocol listener
network.port.json=5001

# Client-side protocol selection: text or json.
# If missing or invalid, defaults to text.
client.protocol=json

# Optional client port; if not set, falls back to protocol-specific default
# (network.port.text or network.port.json).
# client.port=5000

# Delay between robot moves in milliseconds (0 = no delay)
robot.delay.ms=500

